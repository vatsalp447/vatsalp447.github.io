height:8px;
background:#eee;
border-radius:6px;
margin:4px 0 10px 0;
overflow:hidden;
}

.progressFill{
height:100%;
width:0%;
background:linear-gradient(90deg,#ffbe0b,#fb5607);
transition:width .4s;
}

/* RIGHT UI PANEL */

.ui-panel{
position:fixed;
right:15px;
top:120px;
background:white;
padding:15px;
border-radius:15px;

}

button{
border:none;
padding:8px 12px;
border-radius:10px;
margin-top:6px;

font-weight:bold;
}

.journal-btn{background:#7ee8fa}
.map-btn{background:#ffd166}
.share-btn{background:#caffbf}

/* FACT POPUP */

.fact-popup{
position:absolute;
background:white;
padding:20px;
border-radius:20px;
max-width:260px;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
animation:pop .35s ease;
}

.rarity-common{border-left:8px solid #8ecae6}
.rarity-rare{border-left:8px solid #3a86ff}
.rarity-epic{border-left:8px solid #8338ec}
.rarity-legendary{
border-left:8px solid gold;
box-shadow:0 0 20px gold;
}

@keyframes pop{
from{transform:scale(.3);opacity:0}
to{transform:scale(1);opacity:1}
}

/* BOX */

.box{
width:70px;
height:70px;
background:#ffd166;
position:absolute;
border-radius:15px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
animation:float 4s infinite ease-in-out;
font-size:28px;
}

/* CREATURE */

.creature{
position:absolute;
font-size:42px;
cursor:pointer;
animation:creatureFloat 6s infinite ease-in-out;
user-select:none;
}

@keyframes creatureFloat{
0%{transform:translateY(0)}
50%{transform:translateY(-25px)}
100%{transform:translateY(0)}
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-20px)}
100%{transform:translateY(0)}
}

/* PARTICLES */

.particle{
position:absolute;
width:8px;
height:8px;
background:white;
border-radius:50%;
pointer-events:none;
animation:explode 1s forwards;
}

@keyframes explode{
to{
transform:translate(var(--x),var(--y));
opacity:0
}
}

/* JOURNAL */

.journal{
position:fixed;
left:20px;
top:210px;
background:white;
padding:15px;
border-radius:15px;
width:220px;
max-height:300px;
overflow:auto;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
display:none;
}

/* MAP */

.map{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:white;
padding:12px 18px;
border-radius:20px;
box-shadow:0 10px 20px rgba(0,0,0,.2);

}

position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(.5);
background:white;
padding:30px 40px;

let discovered=0;
let currentWorld="Earth";


/* ---------------- CELEBRATION ---------------- */

function showCelebration(text){

const c=document.getElementById("celebration");

c.innerText="🎉 "+text;

c.classList.add("show");

setTimeout(()=>c.classList.remove("show"),3000);

}


/* ---------------- PROGRESS SYSTEM ---------------- */

function updateProgress(){

let earth=Math.min(discovered/20*100,100);
let ocean=Math.max(0,Math.min((discovered-20)/30*100,100));
let space=Math.max(0,Math.min((discovered-50)/50*100,100));

if(discovered>=20 && currentWorld==="Earth"){
currentWorld="Ocean";
showCelebration("Ocean World Unlocked!");
}

if(discovered>=50 && currentWorld==="Ocean"){
currentWorld="Space";
showCelebration("Space World Unlocked!");
}

document.getElementById("earthBar").style.width=earth+"%";
document.getElementById("oceanBar").style.width=ocean+"%";
document.getElementById("spaceBar").style.width=space+"%";

document.getElementById("globalProgress").style.width=Math.min(discovered,100)+"%";

document.getElementById("worldStatus").innerText="World: "+currentWorld;

}


/* ---------------- RARITY SYSTEM ---------------- */

function getRarity(){

const r=Math.random();

if(r<0.7) return "common";
if(r<0.9) return "rare";
if(r<0.99) return "epic";

return "legendary";

}


/* ---------------- FACT PICKER (NO REPEAT) ---------------- */

function randomFact(){

let facts = worldFacts[currentWorld];

let available = facts.filter(f => !journalFacts.includes(f));

if(available.length===0){
available=facts;
}

return available[Math.floor(Math.random()*available.length)];

}


/* ---------------- MIXED FACT PICKER ---------------- */

function randomMixedFact(){

let available = mixedFacts.filter(f => !journalFacts.includes(f));

if(available.length===0){
available=mixedFacts;
}

return available[Math.floor(Math.random()*available.length)];

}


/* ---------------- FACT POPUP ---------------- */

function spawnPopup(x,y,fact){

const rarity=getRarity();

const div=document.createElement("div");

div.className=`fact-popup rarity-${rarity}`;

if(!journalFacts.includes(fact)){
journalFacts.push(fact);
}

updateJournal();

discovered++;

updateProgress();

document.getElementById("counter").innerText="Facts discovered: "+discovered;

div.innerHTML=`<b>${rarity.toUpperCase()} FACT</b><br>${fact}<br><button class='share-btn' onclick='shareFact("${fact}")'>Share</button>`;

div.style.left=x+"px";
div.style.top=y+"px";

document.body.appendChild(div);

setTimeout(()=>div.remove(),6000);

}


/* ---------------- PARTICLE EFFECT ---------------- */

function particles(x,y){

for(let i=0;i<12;i++){

const p=document.createElement("div");

p.className="particle";

const angle=Math.random()*Math.PI*2;
const dist=80*Math.random();

p.style.left=x+"px";
p.style.top=y+"px";

p.style.setProperty("--x",Math.cos(angle)*dist+"px");
p.style.setProperty("--y",Math.sin(angle)*dist+"px");

document.body.appendChild(p);

setTimeout(()=>p.remove(),1000);

}

}


/* ---------------- BOX SPAWN ---------------- */

function createBox(){

const box=document.createElement("div");

box.className="box";

box.innerHTML="📦";

box.style.left=Math.random()*(window.innerWidth-80)+"px";
box.style.top=Math.random()*(window.innerHeight-80)+"px";

box.onclick=(e)=>{

const fact=randomFact();

spawnPopup(e.clientX,e.clientY,fact);

particles(e.clientX,e.clientY);

box.remove();

setTimeout(createBox,2000);

};

document.body.appendChild(box);

}


/* ---------------- CREATURE SPAWN ---------------- */

function createCreature(){

const c=document.createElement("div");

c.className="creature";

if(Math.random()<0.05){
c.innerText="🐲";
}else{
c.innerText=creatures[Math.floor(Math.random()*creatures.length)];
}

c.style.left=Math.random()*(window.innerWidth-100)+"px";
c.style.top=Math.random()*(window.innerHeight-150)+"px";

c.onclick=(e)=>{

const fact=randomFact();

spawnPopup(e.clientX,e.clientY,fact);

particles(e.clientX,e.clientY);

c.remove();

setTimeout(createCreature,4000);

};

document.body.appendChild(c);

}


/* ---------------- JOURNAL ---------------- */

function updateJournal(){

const list=document.getElementById("journalList");

list.innerHTML="";

journalFacts.slice(-25).forEach(f=>{

const li=document.createElement("li");

li.textContent=f;

list.appendChild(li);

});

}

function toggleJournal(){

const j=document.getElementById("journal");

j.style.display=j.style.display==="none"?"block":"none";

}


/* ---------------- MAP ---------------- */

function showMap(){

alert("Discover facts to unlock worlds!\n20 → Ocean 🌊\n50 → Space 🚀");

}


/* ---------------- SHARE ---------------- */

function shareFact(fact){

if(navigator.share){
navigator.share({title:"Amazing Fact",text:fact});
}else{
alert("Share this fact: "+fact);
}

}


/* ---------------- MIX FACT BUTTON ---------------- */

document.getElementById("mixFactDot").onclick=function(){

const fact=randomMixedFact();

spawnPopup(window.innerWidth/2,window.innerHeight/2,fact);

};


/* ---------------- START GAME ---------------- */

for(let i=0;i<6;i++) createBox();

for(let i=0;i<4;i++) createCreature();

</script>




</html>
